<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Carga de Hierbas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .debug-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.warning { background: #fff3cd; color: #856404; }
        .status.info { background: #d1ecf1; color: #0c5460; }
        .button {
            padding: 10px 20px;
            margin: 10px 5px 10px 0;
            background: #c17e3e;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .button:hover { background: #a66b32; }
        .output {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .blog-item {
            background: #fafaf8;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            border-left: 3px solid #c17e3e;
        }
    </style>
</head>
<body>
    <div class="debug-container">
        <h1>🔧 Debug - Carga de Hierbas (Blogs)</h1>
        
        <div id="status-container"></div>
        
        <div>
            <button class="button" onclick="checkFirebaseConnection()">1. Verificar Conexión Firebase</button>
            <button class="button" onclick="loadBlogs()">2. Cargar Blogs desde Firebase</button>
            <button class="button" onclick="checkDOMElements()">3. Verificar Elementos DOM</button>
            <button class="button" onclick="checkHerbsCache()">4. Verificar Cache de Hierbas</button>
            <button class="button" onclick="clearAll()">Limpiar Todo</button>
        </div>
        
        <div id="output" class="output"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="./public/firebase-config.js"></script>

    <script>
        const output = document.getElementById('output');
        const statusContainer = document.getElementById('status-container');

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            console.log(`[${time}] ${message}`);
            output.innerHTML += `<div class="status ${type}">[${time}] ${message}</div>`;
            output.scrollTop = output.scrollHeight;
        }

        async function checkFirebaseConnection() {
            output.innerHTML = '';
            try {
                log('Verificando conexión a Firebase...', 'info');
                
                // Simulación - en el navegador se cargaría desde public/firebase-config.js
                if (typeof window.firebase === 'undefined') {
                    log('❌ Firebase no está cargado en window.firebase', 'error');
                    log('Intenta recargar la página si el archivo firebase-config.js no se está cargando correctamente', 'warning');
                    return;
                }
                
                log('✅ Firebase está disponible', 'success');
                log('Versión de Firebase: ' + (window.firebase?.app?.SDK_VERSION || 'desconocida'), 'info');
                
                if (window.firebase.firestore) {
                    log('✅ Firestore está disponible', 'success');
                } else {
                    log('❌ Firestore no está disponible', 'error');
                }
            } catch (error) {
                log('❌ Error: ' + error.message, 'error');
            }
        }

        async function loadBlogs() {
            output.innerHTML = '';
            try {
                log('Cargando blogs desde Firestore...', 'info');
                
                if (!window.firebase?.firestore?.getFirestore) {
                    log('❌ Firestore no está disponible correctamente', 'error');
                    return;
                }
                
                const db = window.firebase.firestore.getFirestore();
                const collection = window.firebase.firestore.collection;
                const getDocs = window.firebase.firestore.getDocs;
                
                const querySnapshot = await getDocs(collection(db, 'blogs'));
                
                if (querySnapshot.empty) {
                    log('⚠️ No se encontraron documentos en la colección "blogs"', 'warning');
                    return;
                }
                
                log(`✅ Se encontraron ${querySnapshot.size} blogs`, 'success');
                
                const blogs = [];
                querySnapshot.docs.forEach(doc => {
                    const data = doc.data();
                    blogs.push({ id: doc.id, ...data });
                    
                    const blogHtml = `
                        <div class="blog-item">
                            <strong>${data.title || 'Sin título'}</strong><br>
                            ID: ${doc.id}<br>
                            Imagen: ${data.image || data.thumbnail || 'No'}<br>
                            Descripción: ${(data.description || data.content || 'Sin descripción').substring(0, 50)}...
                        </div>
                    `;
                    output.innerHTML += blogHtml;
                });
                
                log('✅ Blogs listados arriba', 'success');
                
                // Guardar en sessionStorage para verificar después
                sessionStorage.setItem('debugBlogs', JSON.stringify(blogs));
                
            } catch (error) {
                log(`❌ Error al cargar blogs: ${error.message}`, 'error');
                log(`Stack: ${error.stack}`, 'error');
            }
        }

        function checkDOMElements() {
            output.innerHTML = '';
            try {
                log('Verificando elementos DOM necesarios...', 'info');
                
                const elements = {
                    'herb-details-modal': '#herb-details-modal',
                    'herb-details-name': '#herb-details-name',
                    'herb-details-image': '#herb-details-image',
                    'herb-details-description': '#herb-details-description',
                    'close-herb-modal': '#close-herb-modal',
                    'herbs-selection-container': '#herbs-selection-container',
                    'search-herbs': '#search-herbs',
                    'selected-herbs-count': '#selected-herbs-count',
                    'selected-herbs-text': '#selected-herbs-text',
                    'mix-form': '#mix-form',
                    'mix-modal': '#mix-modal',
                };
                
                let allFound = true;
                for (const [name, selector] of Object.entries(elements)) {
                    const el = document.querySelector(selector);
                    if (el) {
                        log(`✅ ${name} encontrado`, 'success');
                    } else {
                        log(`❌ ${name} NO encontrado (${selector})`, 'error');
                        allFound = false;
                    }
                }
                
                if (allFound) {
                    log('✅ Todos los elementos DOM necesarios están presentes', 'success');
                } else {
                    log('⚠️ Faltan algunos elementos DOM', 'warning');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        function checkHerbsCache() {
            output.innerHTML = '';
            try {
                log('Verificando cache de hierbas...', 'info');
                
                const cachedBlogs = sessionStorage.getItem('debugBlogs');
                if (cachedBlogs) {
                    const blogs = JSON.parse(cachedBlogs);
                    log(`✅ Se encontraron ${blogs.length} blogs en cache`, 'success');
                    log('Los blogs cargados son accesibles para el módulo de mezclas', 'info');
                } else {
                    log('ℹ️ No hay blogs en cache. Primero ejecuta "2. Cargar Blogs desde Firebase"', 'info');
                }
                
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
            }
        }

        function clearAll() {
            output.innerHTML = '';
            sessionStorage.clear();
            log('✅ Cache limpiado', 'success');
        }

        // Verificación inicial
        window.addEventListener('load', () => {
            log('Página cargada - Abre la consola del navegador (F12) para más detalles', 'info');
        });
    </script>
</body>
</html>
